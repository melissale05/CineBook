<body class="min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container film-strip-bg relative">
<div class="fixed inset-0 film-grain z-50"></div>
<!-- Animated background elements -->
<div class="animated-strip top-1/4 -left-10 opacity-40"></div>
<div class="animated-strip bottom-1/4 -right-10 opacity-30" style="transform: rotate(3deg);"></div>
<!-- Header -->
<header class="w-full bg-[#131313]/90 backdrop-blur-md py-6 px-12 flex justify-between items-center sticky top-0 z-40 border-b border-outline-variant/10 shadow-2xl">
<div class="flex items-center gap-2">
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-on-surface">CineBook</h1>
</div>
<div class="flex items-center gap-4">
<!-- Whiteboard text removed -->
</div>
</header>
<main class="flex-grow flex items-center justify-center p-8 relative overflow-hidden">
<!-- Ambient Glow Effects -->
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full blur-[120px] bg-primary-container/10"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full blur-[120px] bg-secondary-container/10"></div>
<div class="w-full max-w-5xl flex cinematic-shadow rounded-xl overflow-hidden border border-outline-variant/15 relative z-10">
<!-- Left Panel: Login -->
<section class="flex-1 glass-panel p-12 relative border-r border-outline-variant/10">
<div class="mb-10">
<h2 class="font-headline text-4xl font-bold text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant font-body">Sign in to your CineBook Elite account.</p>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="block text-xs font-label text-on-surface-variant uppercase tracking-wider">Email Address</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface p-3 focus:ring-0 focus:border-primary-container transition-all placeholder:text-surface-variant" placeholder="name@cinebook.com" type="email"/>
</div>
<div class="space-y-1">
<label class="block text-xs font-label text-on-surface-variant uppercase tracking-wider">Password</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface p-3 focus:ring-0 focus:border-primary-container transition-all placeholder:text-surface-variant" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded-sm bg-surface-container-highest border-outline-variant text-primary-container focus:ring-offset-surface focus:ring-primary-container" type="checkbox"/>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-sm text-primary transition-all hover:text-primary-container hover:underline decoration-primary/30" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-lg font-headline font-bold text-lg tracking-tight shadow-[0_0_20px_rgba(0,212,255,0.3)] hover:shadow-[0_0_30px_rgba(0,212,255,0.5)] transform active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3" type="submit">
<span>Access Dashboard</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
</form>
<div class="mt-8 flex items-center gap-4 opacity-50">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="text-xs uppercase font-label">Secure Access</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
</section>
<!-- Right Panel: Register -->
<section class="flex-1 p-12 relative overflow-hidden bg-[#161616]/90 backdrop-blur-md">
<div class="relative z-10">
<div class="mb-10">
<h2 class="font-headline text-4xl font-bold text-on-surface mb-2">Join the Elite</h2>
<p class="text-on-surface-variant font-body">Create your cinematic profile today.</p>
</div>
<form class="space-y-5">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="block text-xs font-label text-on-surface-variant uppercase tracking-wider">Full Name</label>
<input class="w-full bg-surface-container/50 border-0 border-b border-outline-variant/30 text-on-surface p-3 focus:ring-0 focus:border-secondary transition-all placeholder:text-surface-variant" placeholder="John Wick" type="text"/>
</div>
<div class="space-y-1">
<label class="block text-xs font-label text-on-surface-variant uppercase tracking-wider">Email</label>
<input class="w-full bg-surface-container/50 border-0 border-b border-outline-variant/30 text-on-surface p-3 focus:ring-0 focus:border-secondary transition-all placeholder:text-surface-variant" placeholder="wick@continental.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-xs font-label text-on-surface-variant uppercase tracking-wider">Choose Password</label>
<input class="w-full bg-surface-container/50 border-0 border-b border-outline-variant/30 text-on-surface p-3 focus:ring-0 focus:border-secondary transition-all placeholder:text-surface-variant" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-1">
<label class="block text-xs font-label text-on-surface-variant uppercase tracking-wider">Favorite Genre</label>
<select class="w-full bg-surface-container border-0 border-b border-outline-variant/30 text-on-surface p-3 focus:ring-0 focus:border-secondary transition-all appearance-none cursor-pointer">
<option>Horror</option>
<option>Action</option>
<option>Sci-Fi</option>
<option>Comedy</option>
<option>Drama</option>
<option>Thriller</option>
</select>
</div>
<div class="pt-4">
<button class="w-full bg-surface-container-highest hover:bg-surface-variant text-on-surface border border-outline-variant/50 py-4 rounded-lg font-headline font-bold text-lg tracking-tight transition-all duration-300 transform active:scale-[0.98] group flex items-center justify-center gap-3" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<p class="mt-6 text-center text-xs text-on-surface-variant">
                        By signing up, you agree to our <a class="underline hover:text-on-surface" href="#">Terms of Service</a>.
                    </p>
</div>
</section>
</div>

<footer class="w-full py-12 px-12 bg-[#0f0f0f]/80 backdrop-blur-md border-t border-outline-variant/10">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
<div class="max-w-md text-center md:text-left">
<!-- Role-based access text removed -->
</div>
<div class="flex flex-col items-center md:items-end gap-4">
<!-- Quick Access Demo section removed -->
</div>
</div>
<div class="mt-4 text-center">
<p class="text-[10px] font-label uppercase tracking-[0.3em] text-outline/40">© 2024 CineBook. All Rights Reserved.</p>
</div>
</footer>
